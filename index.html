<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>異変回廊 - Anomaly Corridor</title>
<style>
:root{
  --bg:#050505;
  --panel:rgba(10,12,14,.86);
  --line:rgba(255,255,255,.18);
  --txt:#f5f5f0;
  --muted:#b9b9ad;
  --accent:#f8d36a;
  --danger:#ff4b4b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#000;color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%;}
#uiLayer{position:fixed;inset:0;z-index:8;pointer-events:none}
#vignette{position:absolute;inset:0;box-shadow:inset 0 0 72px rgba(0,0,0,.50), inset 0 0 20px rgba(0,0,0,.40)}
#grain{position:absolute;inset:-40%;opacity:.045;background-image:radial-gradient(circle at 30% 20%,#fff 0 1px,transparent 1px),radial-gradient(circle at 70% 80%,#fff 0 1px,transparent 1px);background-size:5px 5px;animation:grain 1.2s steps(4) infinite}
@keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(2%,1%)}50%{transform:translate(-1%,2%)}75%{transform:translate(1%,-2%)}100%{transform:translate(0,0)}}
#crosshair{position:absolute;left:50%;top:50%;width:14px;height:14px;transform:translate(-50%,-50%);border:1px solid rgba(255,255,255,.48);border-radius:50%;opacity:.8}
#crosshair::after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;transform:translate(-50%,-50%);background:rgba(255,255,255,.55);border-radius:50%}
#hud{position:absolute;left:calc(14px + env(safe-area-inset-left));top:calc(14px + env(safe-area-inset-top));padding:10px 12px;border:1px solid var(--line);border-radius:16px;background:rgba(0,0,0,.38);backdrop-filter:blur(10px);font-weight:800;letter-spacing:.05em;text-shadow:0 2px 8px #000;min-width:118px}
#hud small{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:0}
#progressDots{display:flex;gap:4px;margin-top:8px}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.20);box-shadow:0 0 0 1px rgba(255,255,255,.10) inset}
.dot.on{background:var(--accent);box-shadow:0 0 12px rgba(248,211,106,.45)}
.dot.clear{background:#f5f5f0;box-shadow:0 0 14px rgba(255,255,255,.45)}
#message{position:absolute;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);max-width:min(680px,92vw);padding:10px 14px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(0,0,0,.42);backdrop-filter:blur(10px);color:#eee;text-align:center;font-size:13px;opacity:.9;transition:opacity .25s,transform .25s}
body.running #message{opacity:.82}
body.horror #message{opacity:.25;transform:translateX(-50%) translateY(6px)}
#pauseBtn{position:fixed;right:calc(16px + env(safe-area-inset-right));top:calc(16px + env(safe-area-inset-top));z-index:14;width:54px;height:54px;border-radius:999px;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.36);color:#fff;font-size:22px;display:none;align-items:center;justify-content:center;pointer-events:auto;backdrop-filter:blur(10px);box-shadow:0 12px 30px rgba(0,0,0,.25)}
#pauseBtn:active{transform:scale(.96)}
#lookPad{position:fixed;right:0;top:0;width:58%;height:100%;z-index:9;display:none;pointer-events:auto}
#joyWrap{position:fixed;left:calc(26px + env(safe-area-inset-left));bottom:calc(34px + env(safe-area-inset-bottom));z-index:12;width:132px;height:132px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:radial-gradient(circle,rgba(255,255,255,.14),rgba(255,255,255,.04));box-shadow:0 16px 40px rgba(0,0,0,.35),inset 0 0 25px rgba(255,255,255,.04);display:none;pointer-events:auto;touch-action:none}
#joyKnob{position:absolute;left:50%;top:50%;width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.62);box-shadow:0 8px 20px rgba(0,0,0,.35),inset 0 0 14px rgba(255,255,255,.28);transform:translate(-50%,-50%);pointer-events:none}
#overlay{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at center,rgba(20,22,22,.95),rgba(0,0,0,.96));}
.card{width:min(720px,96vw);max-height:calc(100vh - 44px);overflow:auto;border:1px solid rgba(255,255,255,.18);border-radius:28px;background:linear-gradient(180deg,rgba(28,30,31,.9),rgba(5,6,7,.86));box-shadow:0 28px 80px rgba(0,0,0,.56);padding:28px;text-align:center;position:relative}
.card::before{content:"";position:absolute;left:-20%;right:-20%;top:-2px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.8}
.card h1{margin:0 0 6px;font-size:clamp(34px,8vw,68px);letter-spacing:.13em;font-weight:900}
.card h2{margin:0 0 20px;color:var(--muted);font-size:14px;font-weight:700;letter-spacing:.12em}
.ruleBox{display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:left;margin:18px 0}
.rule{border:1px solid rgba(255,255,255,.13);border-radius:18px;background:rgba(0,0,0,.28);padding:14px;line-height:1.65;color:#ddd;font-size:14px}
.rule b{color:var(--accent)}
.keys{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.key{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:26px;padding:0 8px;border-radius:8px;background:#242424;border:1px solid #444;box-shadow:inset 0 -2px #111;font-family:ui-monospace,Menlo,monospace;font-weight:800;color:#fff}
.mainBtn{width:min(360px,86vw);margin:14px auto 0;padding:16px 18px;border:0;border-radius:18px;background:linear-gradient(180deg,#fff4c1,#f3c846);color:#111;font-size:19px;font-weight:900;letter-spacing:.06em;box-shadow:0 14px 35px rgba(248,211,106,.18);cursor:pointer}
.subBtn{margin-top:12px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#fff;border-radius:14px;padding:10px 14px;font-weight:800;cursor:pointer}
.menuPanel{margin:16px 0 6px;padding:14px;border:1px solid rgba(255,255,255,.13);border-radius:18px;background:rgba(0,0,0,.24);text-align:left}
.menuTitle{font-size:13px;color:var(--muted);font-weight:900;margin-bottom:8px;letter-spacing:.08em}
.choiceRow{display:flex;gap:8px;flex-wrap:wrap}
.choiceBtn{border:1px solid rgba(255,255,255,.20);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;padding:9px 12px;font-weight:900;cursor:pointer}
.choiceBtn.active{background:linear-gradient(180deg,#fff4c1,#f3c846);color:#111;border-color:transparent}
.settingGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.settingGrid label{font-size:12px;color:#ddd;display:flex;flex-direction:column;gap:5px}
.settingGrid select,.settingGrid input{width:100%;accent-color:#f3c846}
#saveInfo{margin-top:10px;color:#bfbfb5;font-size:12px;line-height:1.6}
.modal{position:fixed;inset:0;z-index:45;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.72);backdrop-filter:blur(10px)}
.modal.show{display:flex}
.modalCard{width:min(780px,96vw);max-height:86vh;overflow:auto;border:1px solid rgba(255,255,255,.18);border-radius:24px;background:rgba(13,14,15,.94);padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modalTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.modalTop h3{margin:0;font-size:22px;letter-spacing:.08em}
.zukanGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px}
.zukanItem{border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px;background:rgba(255,255,255,.045);font-size:13px;line-height:1.5}
.zukanItem.locked{opacity:.45;filter:grayscale(1)}
.tag{display:inline-block;margin-top:4px;padding:2px 7px;border-radius:999px;background:rgba(248,211,106,.16);color:#ffe59a;font-size:11px;font-weight:900}
.notice{margin-top:14px;color:#92928a;font-size:12px;line-height:1.6}
#transition{position:fixed;inset:0;z-index:25;background:#000;opacity:0;pointer-events:none;transition:opacity .28s ease}
#clearScreen{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle,#f8f8f2,#a9aaa6);color:#080808;padding:22px}
#clearScreen h1{font-size:clamp(46px,12vw,98px);margin:0;letter-spacing:.16em}
#clearScreen p{font-size:20px;color:#444;font-weight:800}
#clearScreen button{padding:14px 26px;border:0;border-radius:16px;background:#111;color:#fff;font-weight:900;font-size:17px}
#statusFlash{position:fixed;left:50%;top:22%;z-index:18;transform:translateX(-50%);padding:10px 16px;border-radius:999px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(10px);font-weight:800;opacity:0;transition:.25s;pointer-events:none;text-align:center}
#scanPulse{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,.055) 48%,transparent 52%);opacity:0;transform:translateY(-100%);animation:scanLine 5.2s linear infinite;pointer-events:none}
@keyframes scanLine{0%{transform:translateY(-100%);opacity:0}8%{opacity:.45}32%{opacity:.12}55%{opacity:0}100%{transform:translateY(100%);opacity:0}}
body.anomaly #scanPulse{opacity:.55}
body.anomaly #vignette{box-shadow:inset 0 0 88px rgba(0,0,0,.62), inset 0 0 26px rgba(0,0,0,.50)}
body.horror #vignette{box-shadow:inset 0 0 150px rgba(0,0,0,.86), inset 0 0 42px rgba(90,0,0,.55)}
body.horror #crosshair{border-color:rgba(255,80,80,.58);box-shadow:0 0 18px rgba(255,0,0,.25)}
body.horror #grain{opacity:.09}
#panicFlash{position:fixed;inset:0;z-index:17;background:radial-gradient(circle,rgba(255,0,0,.18),rgba(0,0,0,0) 55%);opacity:0;pointer-events:none;transition:opacity .12s}
#catchScare{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:radial-gradient(circle at center,rgba(120,0,0,.55),rgba(0,0,0,.96) 62%,#000);pointer-events:none;overflow:hidden}
#catchScare.show{display:flex;animation:catchShake .12s steps(2) infinite}
#catchScare::before{content:"";position:absolute;inset:-40%;background-image:radial-gradient(circle,#fff 0 1px,transparent 1px),linear-gradient(180deg,transparent 0%,rgba(255,255,255,.08) 50%,transparent 52%);background-size:4px 4px,100% 7px;opacity:.14;animation:catchNoise .22s steps(3) infinite}
#catchScare::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,transparent 0 22%,rgba(0,0,0,.25) 34%,rgba(0,0,0,.88) 70%);box-shadow:inset 0 0 180px rgba(0,0,0,.98)}
.scareFace{position:relative;z-index:2;width:min(440px,84vw);height:min(300px,56vw);display:flex;flex-direction:column;align-items:center;justify-content:center;filter:drop-shadow(0 0 22px rgba(255,0,0,.45))}
.scareEyes{display:flex;gap:clamp(36px,12vw,92px);margin-bottom:28px;animation:eyePulse .34s infinite alternate}
.scareEye{width:clamp(54px,16vw,110px);height:clamp(54px,16vw,110px);border-radius:50%;background:#f2f2eb;box-shadow:0 0 30px rgba(255,255,255,.55), inset 0 0 16px rgba(0,0,0,.35);position:relative}
.scareEye::after{content:"";position:absolute;left:50%;top:50%;width:32%;height:32%;transform:translate(-50%,-50%);border-radius:50%;background:#020202;box-shadow:0 0 16px rgba(0,0,0,.8)}
.scareText{font-size:clamp(26px,8vw,58px);font-weight:1000;letter-spacing:.16em;color:#fff;text-shadow:0 0 10px #f00,0 0 28px #b00000;animation:textGlitch .18s steps(2) infinite}
.scareSub{margin-top:12px;color:#ffb3b3;font-size:14px;font-weight:900;letter-spacing:.2em;text-shadow:0 0 10px #900}
@keyframes catchShake{0%{transform:translate(0,0) scale(1)}25%{transform:translate(8px,-5px) scale(1.02)}50%{transform:translate(-7px,4px) scale(1.01)}75%{transform:translate(5px,7px) scale(1.03)}100%{transform:translate(0,0) scale(1)}}
@keyframes catchNoise{0%{transform:translate(0,0)}50%{transform:translate(-3%,2%)}100%{transform:translate(2%,-2%)}}
@keyframes eyePulse{from{transform:scale(.94)}to{transform:scale(1.08)}}
@keyframes textGlitch{0%{transform:translateX(-2px);opacity:.86}50%{transform:translateX(3px);opacity:1}100%{transform:translateX(0);opacity:.92}}
body.mobile #joyWrap,body.mobile #lookPad,body.mobile #pauseBtn{display:flex}
body:not(.running) #joyWrap,body:not(.running) #lookPad,body:not(.running) #pauseBtn{display:none!important}
@media(max-width:640px){.card{padding:22px 18px}.ruleBox{grid-template-columns:1fr}.rule{font-size:13px}.settingGrid{grid-template-columns:1fr}#message{display:none}#hud{font-size:13px;max-width:172px}#joyWrap{width:122px;height:122px;left:18px;bottom:28px;transform-origin:left bottom}#joyKnob{width:54px;height:54px}.subBtn{padding:9px 11px;font-size:13px}}
</style>
</head>
<body>
<div id="transition"></div>
<div id="uiLayer">
  <div id="grain"></div>
  <div id="vignette"></div>
  <div id="scanPulse"></div>
  <div id="crosshair"></div>
  <div id="hud">通路 <span id="floorNum">0</span><small id="hudSmall">異変を確認してください</small><div id="progressDots"></div></div>
  <div id="message">異変があれば戻る。なければ進む。8つ目の出口を目指してください。</div>
</div>
<div id="statusFlash"></div>
<div id="panicFlash"></div>
<div id="catchScare"><div class="scareFace"><div class="scareEyes"><div class="scareEye"></div><div class="scareEye"></div></div><div class="scareText">捕まった</div><div class="scareSub">0番へ戻される</div></div></div>
<div id="lookPad"></div>
<div id="pauseBtn">Ⅱ</div>
<div id="joyWrap"><div id="joyKnob"></div></div>
<div id="overlay">
  <div class="card">
    <h1>異変回廊</h1>
    <h2>ANOMALY CORRIDOR / ORIGINAL WEB GAME</h2>
    <div class="ruleBox">
      <div class="rule"><b>ルール</b><br>いつもと違う異変を見つけたら、すぐに引き返す。異変がなければ奥へ進む。間違えると0に戻ります。</div>
      <div class="rule"><b>操作</b><br>PC：<span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>で移動、マウスで視点。<br>スマホ：左パッドで移動、右画面スワイプで視点。</div>
    </div>
    <div class="menuPanel">
      <div class="menuTitle">難易度</div>
      <div class="choiceRow">
        <button class="choiceBtn active" data-mode="normal">ノーマル</button>
        <button class="choiceBtn" data-mode="hard">ハード</button>
        <button class="choiceBtn" data-mode="horror">ホラー</button>
      </div>
      <div class="settingGrid">
        <label>画質<select id="qualitySelect"><option value="auto">自動</option><option value="low">低</option><option value="mid">中</option><option value="high">高</option></select></label>
        <label>ホラー演出<select id="horrorSelect"><option value="0.55">弱め</option><option value="1">普通</option><option value="1.25">強め</option></select></label>
        <label>視点感度<input id="lookRange" type="range" min="0.6" max="1.7" value="1" step="0.05"></label>
        <label>パッドサイズ<input id="joyRange" type="range" min="0.85" max="1.35" value="1" step="0.05"></label>
      </div>
      <div id="saveInfo"></div>
    </div>
    <button id="startBtn" class="mainBtn">ゲーム開始</button>
    <button id="resumeBtn" class="subBtn" style="display:none">続ける</button>
    <button id="zukanBtn" class="subBtn">異変図鑑</button>
    <button id="resetSaveBtn" class="subBtn">記録リセット</button>
    <div class="notice">後半ほど細かい異変とホラー異変が増えます。設定と発見記録は自動保存されます。</div>
  </div>
</div>
<div id="clearScreen">
  <div>
    <h1>脱出成功</h1>
    <p>あなたは正しい出口を見つけました。</p>
    <button id="restartBtn">もう一度プレイ</button>
  </div>
</div>
<div id="zukanModal" class="modal">
  <div class="modalCard">
    <div class="modalTop"><h3>異変図鑑</h3><button id="closeZukanBtn" class="subBtn">閉じる</button></div>
    <div id="zukanGrid" class="zukanGrid"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
'use strict';

const $ = (id) => document.getElementById(id);
const isTouchDevice = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
if (isTouchDevice) document.body.classList.add('mobile');

const SAVE_KEY = 'anomaly_corridor_save_v5';
let gameMode = 'normal';

let scene, camera, renderer;
let ambient, fog;

let started = false;

};

const anomalyList = [
  'flicker','redLight','wrongSign','missingSign','invertedPoster','blackPosters','manyPosters','movingEyes',
  'stain','floatingBench','ceilingBench','movingCone','lowCeiling','watcher','giantFigure','extraDoor','heavyFog','warpedView','wallMessage','thinCorridor',
  'posterFace','handPrints','tileMissing','lampFallen','exitBlocked','floorArrow','noFigure','doubleFigure','backwardWalker','closeFigure','longArms','fastWalker','silentCorridor','cameraMany',
  'vendingGone','vendingWrong','clockFast','adsChanged','ceilingLeak','floorWave','shadowFigure','phoneRinging','warningLine','mirrorFigure','brokenTiles','lightsTooMany',
  'tileManChase','redGirlStand','rushShadow','blackoutWhisper','doorKnock','ceilingCrawler','statueTurn','faceWall',

  'posterFace','clockFast','adsChanged','mirrorFigure','brokenTiles','faceWall'
];

const easyAnomalies = ['wrongSign','invertedPoster','redLight','missingSign','blackPosters','manyPosters','floatingBench','ceilingBench','extraDoor','floorArrow','lampFallen'];

const horrorAnomalies = ['tileManChase','redGirlStand','rushShadow','blackoutWhisper','doorKnock','ceilingCrawler','statueTurn','faceWall','shadowFigure','phoneRinging'];

const anomalyNames = {
  flicker:'蛍光灯の点滅', redLight:'赤い照明', wrongSign:'番号違いの看板', missingSign:'消えた看板', invertedPoster:'逆さポスター', blackPosters:'黒いポスター', manyPosters:'大量ポスター', movingEyes:'動くポスター',
  stain:'黒いシミ', floatingBench:'浮くベンチ', ceilingBench:'天井のベンチ', movingCone:'動くコーン', lowCeiling:'低い天井', watcher:'こちらを見る人', giantFigure:'大きすぎる人', extraDoor:'増えた扉', heavyFog:'濃い霧', warpedView:'歪む視界', wallMessage:'戻れの看板', thinCorridor:'細い通路',

function loadGameData(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw) gameData = Object.assign(gameData, JSON.parse(raw));
    gameData.settings = Object.assign({quality:'auto',look:1,joy:1,horror:1,mode:'normal'}, gameData.settings || {});
    gameMode = gameData.settings.mode || 'normal';
    gameData.seen = gameData.seen || {};
  }catch(e){}
}
function saveGameData(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(gameData)); }catch(e){} }
function recordDiscovery(name){
  if(!name) return;
  gameData.seen[name] = true;
  if(currentNumber > gameData.best) gameData.best = currentNumber;
  saveGameData();
  updateMenuUI();
}
function applySettings(){
  const s = gameData.settings;
  const joy = $('joyWrap');
  if(joy) joy.style.transform = 'scale(' + s.joy + ')';
  if(renderer){
    let px = isTouchDevice ? 1.2 : 1.6;
    if(s.quality === 'low') px = 1.0;
    if(s.quality === 'mid') px = isTouchDevice ? 1.25 : 1.5;
    if(s.quality === 'high') px = Math.min(devicePixelRatio, isTouchDevice ? 1.55 : 2.0);
    if(s.quality === 'auto') px = Math.min(devicePixelRatio, isTouchDevice ? 1.35 : 1.8);
    renderer.setPixelRatio(px);
    renderer.shadowMap.enabled = s.quality !== 'low' && !isTouchDevice;
  }
}
function updateMenuUI(){
  document.querySelectorAll('[data-mode]').forEach(btn=>btn.classList.toggle('active', btn.dataset.mode === gameMode));
  const qs=$('qualitySelect'), hs=$('horrorSelect'), lr=$('lookRange'), jr=$('joyRange');
  if(qs) qs.value = gameData.settings.quality;
  if(hs) hs.value = String(gameData.settings.horror);
  if(lr) lr.value = gameData.settings.look;
  if(jr) jr.value = gameData.settings.joy;
  const seenCount = Object.keys(gameData.seen||{}).length;
  const total = Object.keys(anomalyNames).length;
  const info = $('saveInfo');
  if(info) info.innerHTML = 'クリア回数：' + gameData.clears + ' / 最高到達：' + gameData.best + ' / 発見：' + seenCount + ' / ' + total;
}
function renderZukan(){
  const grid = $('zukanGrid');
  if(!grid) return;
  grid.innerHTML = '';
  for(const key of Object.keys(anomalyNames)){
    const found = !!gameData.seen[key];
    const div = document.createElement('div');
    div.className = 'zukanItem' + (found ? '' : ' locked');
    const type = horrorAnomalies.includes(key) || isHorrorAnomaly(key) ? 'ホラー' : hardAnomalies.includes(key) ? '難' : midAnomalies.includes(key) ? '中' : '易';
    div.innerHTML = '<b>' + (found ? anomalyNames[key] : '？？？') + '</b><br><span class="tag">' + type + '</span>';

}

function initAudio(){
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  humGain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 58;
  filter.type = 'lowpass';
  filter.frequency.value = 180;
  humGain.gain.value = 0.035;
  osc.connect(filter); filter.connect(humGain); humGain.connect(audioCtx.destination);
  osc.start();
}

function playStep(){
  if(!audioCtx || audioCtx.state !== 'running') return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime((110 + Math.random()*25) * routeVariant.stepPitch, t);
  osc.frequency.exponentialRampToValueAtTime(42, t + .11);
  filter.type = 'lowpass';
  filter.frequency.value = 420;
  gain.gain.setValueAtTime(.0001, t);
  gain.gain.exponentialRampToValueAtTime(.22, t + .012);
  gain.gain.exponentialRampToValueAtTime(.006, t + .16);
  osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + .18);
}

function playTone(freq=300, dur=.15, volume=.06){
  if(!audioCtx || audioCtx.state !== 'running') return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(volume, t);
  gain.gain.exponentialRampToValueAtTime(.001, t + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur);
}

function canvasTexture(w,h,draw){
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  draw(ctx,w,h);
  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 4;
  tex.needsUpdate = true;
  return tex;
}

function initThree(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f1011);
  fog = new THREE.Fog(0x8e908c, 10, 62);
  scene.fog = fog;

  camera = new THREE.PerspectiveCamera(78, innerWidth/innerHeight, .08, 110);
  camera.position.set(0,3.2,34);
  scene.add(camera);

  ambient = new THREE.AmbientLight(0xffffff,.35);
  scene.add(ambient);

  const hemi = new THREE.HemisphereLight(0xf0ead8, 0x222222, .34);
  scene.add(hemi);

  renderer = new THREE.WebGLRenderer({antialias:!isTouchDevice, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio, isTouchDevice ? 1.35 : 1.8));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = !isTouchDevice;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.82;
  document.body.appendChild(renderer.domElement);

  addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    applySettings();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function add(obj){ scene.add(obj); objects.push(obj); return obj; }

function disposeObject(obj){
  obj.traverse((o)=>{
    if(o.geometry) o.geometry.dispose();
    if(o.material){
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach((m)=>{
        if(m.map && !Object.values(textures).includes(m.map)) m.map.dispose();
        m.dispose();
      });
    }
  });
}

function clearMap(){
  for(const obj of objects){ scene.remove(obj); disposeObject(obj); }
  objects.length = 0;
  updaters.length = 0;
}

function makeTextMaterial(text, bg='#f2f2ed', fg='#111', border='#d6b13b'){
  const tex = canvasTexture(512,256,(ctx,w,h)=>{
    ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle = border; ctx.lineWidth = 16; ctx.strokeRect(8,8,w-16,h-16);
    ctx.fillStyle = fg; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font = '900 76px sans-serif'; ctx.fillText(text,256,128);
  });
  return new THREE.MeshStandardMaterial({map:tex,roughness:.45});
}

function createBox(w,h,d,mat,x,y,z,cast=true){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);
  m.castShadow = cast;
  m.receiveShadow = true;
  return add(m);
}

function createPlane(w,h,mat,x,y,z,rx=0,ry=0,rz=0){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
  m.receiveShadow = true;
  return add(m);
}

function chooseAnomaly(){
  hasAnomaly = currentNumber > 0 && currentNumber < 8;
  if(!hasAnomaly){ anomaly = null; currentAnomalyTier = 'none'; return; }

  const stage = currentNumber <= 3 ? 1 : currentNumber <= 6 ? 2 : 3;
  const chance = gameMode === 'horror' ? .88 : gameMode === 'hard' ? .80 : .68;
  if(Math.random() > chance){ anomaly = null; hasAnomaly = false; currentAnomalyTier = 'none'; return; }

  let pool;
  if(gameMode === 'normal'){
    pool = stage === 1 ? easyAnomalies : stage === 2 ? easyAnomalies.concat(midAnomalies) : midAnomalies.concat(hardAnomalies, horrorAnomalies.slice(0,3));
  }else if(gameMode === 'hard'){
    pool = stage === 1 ? easyAnomalies.concat(midAnomalies) : stage === 2 ? midAnomalies.concat(hardAnomalies) : hardAnomalies.concat(horrorAnomalies);
  }else{
    pool = stage === 1 ? midAnomalies.concat(horrorAnomalies.slice(0,4)) : stage === 2 ? hardAnomalies.concat(horrorAnomalies) : horrorAnomalies.concat(hardAnomalies);
  }

  anomaly = pool[Math.floor(Math.random()*pool.length)];
  currentAnomalyTier = horrorAnomalies.includes(anomaly) || isHorrorAnomaly(anomaly) ? 'horror' : hardAnomalies.includes(anomaly) ? 'hard' : midAnomalies.includes(anomaly) ? 'mid' : 'easy';
}

function updateProgressUI(){
  const box = $('progressDots');
  if(!box) return;
  box.innerHTML = '';
  for(let i=1;i<=8;i++){
    const d = document.createElement('span');
    d.className = 'dot' + (i < currentNumber ? ' clear' : i === currentNumber ? ' on' : '');
    box.appendChild(d);
  }
}

function buildMap(){
  clearMap();
  qualityStep = 0;
  chooseAnomaly();
  $('floorNum').textContent = currentNumber;
  $('hudSmall').textContent = hasAnomaly ? '何かが違うかもしれない' : '普通の通路かもしれない';
  document.body.classList.toggle('anomaly', !!hasAnomaly);
  document.body.classList.toggle('horror', isHorrorAnomaly(anomaly));
  updateProgressUI();

  const low = anomaly === 'lowCeiling';
  const ceilingH = low ? 4.35 : 6.8;
  const narrow = anomaly === 'thinCorridor';
  const halfW = narrow ? 5.2 : 8;

  createPlane(22,ceilingH,matWall,18,ceilingH/2,-20,0,Math.PI);
  createPlane(22,ceilingH,matWall,18,ceilingH/2,-36,0,0);
  // 出口以外が真っ黒な穴に見える問題を修正：壁＋ドア＋枠で構成

  createPlane(4.35,4.85,matDoor,0,2.43,39.94,0,Math.PI);
  createBox(4.8,.14,.12,matFrame,0,4.92,39.88,false);
  createBox(.14,4.95,.12,matFrame,-2.45,2.47,39.88,false);
  createBox(.14,4.95,.12,matFrame,2.45,2.47,39.88,false);

  createPlane(16,ceilingH,matWall,29,ceilingH/2,-28,0,-Math.PI/2);
  createPlane(4.8,4.85,currentNumber>=8?matGlow:matDoor,28.94,2.43,-28,0,-Math.PI/2);
  createBox(.12,.14,5.25,matFrame,28.88,4.92,-28,false);
  createBox(.12,4.95,.14,matFrame,28.88,2.47,-30.65,false);
  createBox(.12,4.95,.14,matFrame,28.88,2.47,-25.35,false);
  const knobMat = new THREE.MeshStandardMaterial({color:0xd4c28a,metalness:.55,roughness:.3});
  const startKnob = new THREE.Mesh(new THREE.SphereGeometry(.13,16,16),knobMat); startKnob.position.set(1.55,2.35,39.78); add(startKnob);
  const goalKnob = new THREE.Mesh(new THREE.SphereGeometry(.13,16,16),knobMat); goalKnob.position.set(28.78,2.35,-26.5); add(goalKnob);
  const exitLampMat = new THREE.MeshStandardMaterial({color:0x77ff99,emissive:0x33ff66,emissiveIntensity: currentNumber>=8 ? 1.8 : .45});
  createBox(.16,.42,2.1,exitLampMat,28.75,5.55,-28,false);
  for(let yy=1.05; yy<4.55; yy+=.52){ createBox(.05,.035,4.25,matFrame,28.74,yy,-28,false); }

  createPlane(1.05,80,matYellow,0,.025,0,-Math.PI/2);
  createPlane(1.05,22,matYellow,18,.03,-28,-Math.PI/2,0,Math.PI/2);

  const lightColor = anomaly === 'redLight' ? 0xff2626 : 0xfff6d4;
  const lightMat = new THREE.MeshStandardMaterial({color:0xffffff,emissive:lightColor,emissiveIntensity:1.9});
  const lights = [];
  for(let z=-30; z<=30; z+=15){
    const lamp = createBox(3.8,.12,.75,lightMat,0,ceilingH-.08,z,false);
    const p = new THREE.PointLight(lightColor,0.82,34);
    p.position.set(0,ceilingH-.6,z);
    if(!isTouchDevice && (z===0 || z===-15)){p.castShadow=true;p.shadow.bias=-.006;}
    add(p); lights.push({p,lamp});
  }
  const turnLamp = createBox(3.8,.12,.75,lightMat,18,ceilingH-.08,-28,false);
  const turnLight = new THREE.PointLight(lightColor,0.82,34); turnLight.position.set(18,ceilingH-.6,-28); add(turnLight); lights.push({p:turnLight,lamp:turnLamp});

  if(anomaly === 'lightsTooMany'){
    for(let z=-32; z<=32; z+=8){
      const extra = createBox(2.4,.1,.44,lightMat,halfW-2.2,ceilingH-.1,z,false);
      const ep = new THREE.PointLight(lightColor,.38,18); ep.position.set(halfW-2.2,ceilingH-.75,z); add(ep); lights.push({p:ep,lamp:extra});
    }
  }

  if(isHorrorAnomaly(anomaly)){
    ambient.intensity = .24;
    fog.color.setHex(0x181514);
    fog.near = 5;
    fog.far = 38;
    shakePower = .008;
  }

  if(anomaly === 'redLight'){
    ambient.intensity = .34;
    fog.color.setHex(0x241010);
    shakePower = .01;
  }
  if(anomaly === 'flicker'){
    updaters.push((t)=>{
      const on = Math.sin(t*23) > -.35 && Math.random() > .04;
      const v = on ? .82 : .06;
      for(const l of lights){ l.p.intensity = v; l.lamp.material.emissiveIntensity = on ? 1.9 : .08; }
    });
  }

  buildStationDetails(halfW, ceilingH);
  createSecurityCamera(halfW, ceilingH, anomaly === 'watcher');

  let signText = currentNumber >= 8 ? '出口' : currentNumber + ' 番';
  if(anomaly === 'wrongSign') signText = (currentNumber + 1) + ' 番';

  if(anomaly !== 'missingSign'){
    const sign = new THREE.Mesh(new THREE.PlaneGeometry(4.8,2.25), makeTextMaterial(signText, anomaly==='wallMessage'?'#111':'#f4f4ee', anomaly==='wallMessage'?'#d00000':'#111'));
    sign.position.set(-halfW+.04,ceilingH-2.2,13);
    sign.rotation.y = Math.PI/2;
    add(sign);
  }

  buildPosters(halfW, ceilingH);

  buildExtraAnomalies(halfW, ceilingH);
  buildHorrorAnomalies(halfW, ceilingH);
  buildFigure(ceilingH);

  if(anomaly === 'stain'){
    const mat = new THREE.MeshBasicMaterial({color:0x020202,transparent:true,opacity:.78});
    const stain = createPlane(3.6,3.6,mat,0,.035,4,-Math.PI/2);
    updaters.push((t)=>{ const s = 1 + Math.sin(t*.7)*.08 + Math.min(2.5, (t%20)*.018); stain.scale.set(s,s,1); });
  }

  if(anomaly === 'extraDoor'){
    const m = new THREE.MeshStandardMaterial({color:0x060606,roughness:.5});
    createPlane(5.5,4.5,m,-halfW+.03,2.25,-9,0,Math.PI/2);
    const knob = new THREE.Mesh(new THREE.SphereGeometry(.12,16,16),new THREE.MeshStandardMaterial({color:0xd6b13b,metalness:.5,roughness:.3}));
    knob.position.set(-halfW+.08,2.3,-7.1); add(knob);
  }

  camera.position.set(0,3.2,34);
  input.yaw = 0; input.pitch = 0;
  applyCameraRotation();
}

function buildStationDetails(halfW, ceilingH){

  const panelMat = new THREE.MeshStandardMaterial({color:0x686a67,roughness:.88});

  for(let z=-34; z<=34; z+=8){
    createBox(15.5,.035,.035,panelMat,0,ceilingH-.045,z,false);
  }

  for(let z=-30; z<=30; z+=12){
    if(anomaly === 'handrailMissing' && z === 6) continue;
    const rail = new THREE.Mesh(new THREE.CylinderGeometry(.045,.045,5.2,12), railMat);
    rail.rotation.x = Math.PI/2;
    rail.position.set(halfW-.07,2.25,z);
    add(rail);
  }

  const ad = new THREE.Mesh(new THREE.PlaneGeometry(5.4,2.25),adMat);
  ad.position.set(halfW-.045,3.55,-8);
  ad.rotation.y = -Math.PI/2;
  add(ad);

  if(anomaly !== 'vendingGone'){
    const vmMat = new THREE.MeshStandardMaterial({map: anomaly === 'vendingWrong' ? textures.vendingOdd : textures.vending, roughness:.55});
    const vm = new THREE.Mesh(new THREE.BoxGeometry(1.45,3.1,.75),vmMat);
    vm.position.set(halfW-1.0,1.55,22);
    vm.rotation.y = -Math.PI/2;
    vm.castShadow = true;
    vm.receiveShadow = true;
    add(vm);
    if(anomaly === 'vendingWrong'){
      const glow = new THREE.PointLight(0xff0000,.7,8); glow.position.set(halfW-1.3,2.7,22); add(glow);
    }
  }

  const clock = new THREE.Group();
  const rim = new THREE.Mesh(new THREE.CylinderGeometry(.72,.72,.08,32),new THREE.MeshStandardMaterial({color:0xf2f2ec,roughness:.4}));
  rim.rotation.x = Math.PI/2; clock.add(rim);
  const handMat = new THREE.MeshBasicMaterial({color:0x111111});
  const h1 = new THREE.Mesh(new THREE.BoxGeometry(.055,.52,.02),handMat); h1.position.y=.16; clock.add(h1);
  const h2 = new THREE.Mesh(new THREE.BoxGeometry(.04,.38,.02),handMat); h2.position.y=.10; h2.rotation.z=1.8; clock.add(h2);
  clock.position.set(-halfW+.06,4.9,-18); clock.rotation.y = Math.PI/2; add(clock);
  if(anomaly === 'clockFast'){
    updaters.push((t)=>{ h1.rotation.z = -t*8; h2.rotation.z = -t*2.3; });
  }
}

function buildPosters(halfW, ceilingH){
  const matA = new THREE.MeshStandardMaterial({map:textures.posterA,roughness:.55});
  const matB = new THREE.MeshStandardMaterial({map:textures.posterB,roughness:.55});
  const matBlack = new THREE.MeshStandardMaterial({map:textures.posterBlack,roughness:.6});
  const matFacePoster = new THREE.MeshStandardMaterial({map:textures.posterFace,roughness:.5});
  const pGeo = new THREE.PlaneGeometry(1.9,2.85);
  const posterZs = [-22,-12,-2,8,18,28];

  if(anomaly === 'manyPosters'){
    for(let z=-31; z<=31; z+=3.1){
      const p = new THREE.Mesh(pGeo, Math.random()>.5?matA:matB);
      p.position.set(-halfW+.04,3.1+Math.random()*1.5,z);
      p.rotation.y = Math.PI/2; add(p);
    }
    return;
  }

  for(let i=0;i<posterZs.length;i++){
    let mat = anomaly === 'blackPosters' ? matBlack : (i%2?matA:matB);
    if(anomaly === 'posterFace' && i === 1) mat = matFacePoster;
    const p = new THREE.Mesh(pGeo, mat);
    p.position.set(-halfW+.04,3.55,posterZs[i] + routeVariant.posterShift);
    p.rotation.y = Math.PI/2;
    if(anomaly === 'invertedPoster' && i===2) p.rotation.z = Math.PI;
    add(p);
    if(anomaly === 'movingEyes' && i===1){
      updaters.push((t)=>{ p.position.y = 3.55 + Math.sin(t*5)*.08; p.scale.x = 1 + Math.sin(t*3)*.04; });
    }
  }
}

function createSecurityCamera(halfW, ceilingH, tracking){
  const group = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(.7,.55,1.15), new THREE.MeshStandardMaterial({color:0x2b2b2b,roughness:.55}));
  const lens = new THREE.Mesh(new THREE.CylinderGeometry(.21,.25,.32,18), new THREE.MeshStandardMaterial({color:0x050505,roughness:.25}));
  lens.rotation.x = Math.PI/2; lens.position.z = .72;
  group.add(body,lens);
  group.position.set(-halfW+.7,ceilingH-1.0,24);
  group.lookAt(0,3,12);
  add(group);
  if(tracking){
    const led = new THREE.Mesh(new THREE.SphereGeometry(.08,12,12),new THREE.MeshBasicMaterial({color:0xff0000})); led.position.set(.25,.18,.74); group.add(led);
    const beam = new THREE.SpotLight(0xff2222,1.5,26,.22,.4,1.2); beam.position.set(0,0,0); beam.target.position.set(0,0,1); group.add(beam,beam.target);
    updaters.push(()=>{ group.lookAt(camera.position.x,camera.position.y,camera.position.z); });
  }
}

  if(anomaly === 'brokenTiles'){
    const crackMat = new THREE.MeshBasicMaterial({color:0x171717,transparent:true,opacity:.78});
    for(let i=0;i<11;i++){
      const c = createPlane(.08,1.6 + Math.random()*1.6,crackMat,-2+Math.random()*4,.07,-20+Math.random()*36,-Math.PI/2);

    }
  }
}

function isHorrorAnomaly(name){
  return horrorAnomalies.includes(name) || ['redTraces','redFootprints','silentWalker'].includes(name);
}

function panic(amount=.7){
  const p = $('panicFlash');
  amount *= (gameData.settings.horror || 1);
  horrorPulse = Math.max(horrorPulse, amount);
  p.style.opacity = String(Math.min(.55, amount));
  clearTimeout(panic.t);
  panic.t = setTimeout(()=>{ p.style.opacity = '0'; }, 120);
}

function scareReset(text='何かに捕まりました。0に戻ります。'){
  recordDiscovery(anomaly);
  if(transitioning || cleared) return;
  transitioning = true;
  resetJoystick();
  currentNumber = 0;
  const scare = $('catchScare');
  scare.classList.add('show');
  document.body.classList.add('horror');
  panic(1.15);
  playTone(48,.34,.12);
  setTimeout(()=>playTone(150,.08,.08),90);
  setTimeout(()=>playTone(72,.18,.1),210);
  showFlash(text,true);
  const t = $('transition');
  t.style.background = '#050000';
  t.style.opacity = '1';
  setTimeout(()=>{
    scare.classList.remove('show');
    buildMap();
    t.style.background = '#000';
    t.style.opacity = '0';
    transitioning = false;
  },980);
}

function buildHorrorAnomalies(halfW, ceilingH){
  if(!isHorrorAnomaly(anomaly)) return;
  const black = new THREE.MeshStandardMaterial({color:0x050505,roughness:.9});
  const pale = new THREE.MeshStandardMaterial({color:0xd8d6cf,roughness:.78});
  const red = new THREE.MeshBasicMaterial({color:0x8b0000,transparent:true,opacity:.72});

  if(anomaly === 'tileManChase'){
    const man = createTileMan();
    man.position.set(-2.2,0,31);
    add(man);
    showFlash('背後からタイルの音がする', true);
    updaters.push((time,dt)=>{
      reusable.tmp.copy(camera.position).sub(man.position); reusable.tmp.y = 0;
      if(reusable.tmp.lengthSq() > .01){ reusable.tmp.normalize(); man.position.addScaledVector(reusable.tmp, dt*3.9); }
      man.lookAt(camera.position.x, man.position.y, camera.position.z);
      man.rotation.z = Math.sin(time*13)*.025;
      animateTileMan(man,time);
      const d = man.position.distanceTo(camera.position);
      if(d < 2.1) scareReset('タイルマンに追いつかれました。0に戻ります。');
      if(d < 8) panic(.5);
    });
  }

  if(anomaly === 'redGirlStand'){
    const girl = createShadowGirl();
    girl.position.set(0,0,-9);
    add(girl);
    let rushed = false;
    updaters.push((time,dt)=>{
      girl.lookAt(camera.position.x,girl.position.y,camera.position.z);
      girl.children[0].rotation.z = Math.sin(time*2.4)*.04;
      const dist = camera.position.distanceTo(girl.position);
      if(!rushed && dist < 13){
        rushed = true;
        playTone(520,.08,.045); setTimeout(()=>playTone(70,.18,.08),90);
      }
      if(rushed){
        reusable.tmp.copy(camera.position).sub(girl.position); reusable.tmp.y=0; reusable.tmp.normalize();
        girl.position.addScaledVector(reusable.tmp, dt*9.5);
        panic(.45);
      }
      if(girl.position.distanceTo(camera.position)<1.55) scareReset('目の前まで迫られました。0に戻ります。');
    });
  }

  if(anomaly === 'rushShadow'){
    const shadow = new THREE.Mesh(new THREE.PlaneGeometry(2.2,4.6),new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.75}));
    shadow.position.set(0,2.3,-30); add(shadow);
    let phase = 0;
    updaters.push((time,dt)=>{
      phase += dt;
      shadow.lookAt(camera.position);
      if(phase > 1.2){ shadow.position.z += dt*17; panic(.5); }
      if(shadow.position.distanceTo(camera.position)<1.8) scareReset('黒い影に飲まれました。0に戻ります。');
    });
  }

  if(anomaly === 'blackoutWhisper'){
    ambient.intensity = .06;
    fog.far = 18;
    showFlash('音が近い。', true);
    updaters.push((time)=>{
      if(Math.random()<.018) playTone(90 + Math.random()*40,.05,.025);
      if(Math.sin(time*3)> .94) panic(.3);
    });
  }

  if(anomaly === 'doorKnock'){
    const door = createPlane(4.4,5.2,black,-halfW+.05,2.6,-5,0,Math.PI/2);
    const eye = new THREE.Mesh(new THREE.PlaneGeometry(1.2,1.2),new THREE.MeshBasicMaterial({map:textures.blankEyes,transparent:true,opacity:.0}));
    eye.position.set(-halfW+.08,3.2,-5); eye.rotation.y=Math.PI/2; add(eye);
    updaters.push((time)=>{
      if(Math.floor(time*2)%3===0 && Math.random()<.02){ playTone(120,.08,.06); door.position.x = -halfW+.04 + Math.sin(time*60)*.04; }
      eye.material.opacity = Math.max(0,Math.sin(time*1.6))* .85;
    });
  }

  if(anomaly === 'ceilingCrawler'){
    const crawler = createTileMan(.72);
    crawler.position.set(1.5,ceilingH-.25,-20);
    crawler.rotation.z = Math.PI;
    add(crawler);
    updaters.push((time,dt)=>{
      crawler.position.z += Math.sin(time*1.4)*dt*2.5 + dt*1.2;

      crawler.lookAt(camera.position.x,crawler.position.y,camera.position.z);
      animateTileMan(crawler,time*1.8);

  if(anomaly === 'statueTurn'){
    const statue = createShadowGirl();
    statue.position.set(-2,0,-16); add(statue);
    let lastYaw = input.yaw;
    updaters.push((time)=>{
      const lookingAway = Math.abs(input.yaw-lastYaw) > .012;
      if(lookingAway){
        reusable.tmp.copy(camera.position).sub(statue.position); reusable.tmp.y=0; reusable.tmp.normalize();
        statue.position.addScaledVector(reusable.tmp,.08);

      }
      lastYaw = input.yaw;

  function createTileMan(scale=1){
    const g = new THREE.Group();
    g.scale.setScalar(scale);
    const tileMat = new THREE.MeshStandardMaterial({map:textures.tileFace,roughness:.82,color:0xd8d8d0});
    const jointMat = new THREE.MeshStandardMaterial({color:0x222222,roughness:.9});
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.05,1.55,.55),tileMat); body.position.y=2.3; g.add(body);

    const addLimb = (name,x,y)=>{ const limb = new THREE.Group(); limb.name=name; limb.position.set(x,y,0); const a=new THREE.Mesh(new THREE.BoxGeometry(.28,.95,.28),tileMat); a.position.y=-.45; limb.add(a); g.add(limb); parts.push(limb); return limb; };
    g.userData.armL = addLimb('armL',-.78,2.92);

    const core = new THREE.PointLight(0xe8f2ff,.35,8); core.position.y=2.6; g.add(core);

  function animateTileMan(g,t){
    if(g.userData.baseY === undefined) g.userData.baseY = g.position.y;
    const s = Math.sin(t*9);

    if(g.userData.armL){
      g.userData.armL.rotation.x = s*.75;
      g.userData.armR.rotation.x = -s*.75;
      g.userData.legL.rotation.x = -s*.7;
      g.userData.legR.rotation.x = s*.7;
    }
    g.position.y = g.userData.baseY + Math.abs(s)*.035;
    g.rotation.x = c*.012;
  }

  function createShadowGirl(){
    const g = new THREE.Group();

    const ribbon = new THREE.Mesh(new THREE.BoxGeometry(.55,.08,.08),red); ribbon.position.set(0,2.18,.48); g.add(ribbon);

    const armR = armL.clone(); armR.position.x=.62; armR.rotation.z=.25; g.add(armR);

function buildFigure(ceilingH){
  const type = anomaly;
  if(type === 'noFigure') return;

  const humans = [];
  const baseSpeed = type === 'fastWalker' ? 3.1 : type === 'silentWalker' ? 0.35 : type === 'giantFigure' ? 1.35 : 1.0;

  createHuman(1.45, type === 'closeFigure' ? 10 : (type === 'silentWalker' ? -7 : -34), type === 'giantFigure' ? 1.85 : 1, type);
  if(type === 'doubleFigure') createHuman(-1.65, -27, 1, 'doubleFigure');

  updaters.push((t,dt)=>{
    for(const h of humans){
      const dir = h.variant === 'backwardWalker' ? -1 : 1;
      h.group.position.z += h.speed * dt * 2.7 * dir;
      if(h.group.position.z > 39) h.group.position.z = -38;
      if(h.group.position.z < -39) h.group.position.z = 38;
      const cycle = t * h.animSpeed + h.phase;
      const sw = Math.sin(cycle);
      const sw2 = Math.sin(cycle + Math.PI);
      const lift = Math.abs(sw);

      h.torso.rotation.x = Math.sin(cycle*.5)*.025;
      h.group.rotation.z = sw * .012;
      h.torso.rotation.z = sw*.055;
      h.body.position.y = 2.15 + lift*.055;
      h.headGroup.position.y = 3.45 + lift*.045;
      h.headGroup.rotation.y = Math.sin(cycle*.35)*.12;

      h.leftArm.upper.rotation.x = sw2*.62;
      h.rightArm.upper.rotation.x = sw*.62;
      h.leftArm.elbow.rotation.x = .18 + Math.max(0,sw)*.32;
      h.rightArm.elbow.rotation.x = .18 + Math.max(0,sw2)*.32;

      h.leftLeg.upper.rotation.x = sw*.58;
      h.rightLeg.upper.rotation.x = sw2*.58;
      h.leftLeg.knee.rotation.x = Math.max(0,-sw)*.78;
      h.rightLeg.knee.rotation.x = Math.max(0,-sw2)*.78;
      h.leftLeg.foot.rotation.x = -.12 + Math.max(0,sw)*.28;
      h.rightLeg.foot.rotation.x = -.12 + Math.max(0,sw2)*.28;

      if(h.variant === 'watcher' || h.variant === 'closeFigure' || h.variant === 'silentWalker'){
        reusable.target.copy(camera.position);
        reusable.target.y = h.headGroup.getWorldPosition(reusable.tmp).y;
        h.headGroup.lookAt(reusable.target);
      }
      if(h.variant === 'giantFigure') shakePower = .015;
    }
  });

  function createHuman(x,z,scale,variant){
    const suit = new THREE.MeshStandardMaterial({color:variant==='giantFigure'?0x111111:0x2b3946,roughness:.86});
    const shirt = new THREE.MeshStandardMaterial({color:0xe8e6dd,roughness:.75});
    const skin = new THREE.MeshStandardMaterial({color:0xe7be8e,roughness:.6});
    const faceMat = new THREE.MeshStandardMaterial({map:variant==='watcher'||variant==='giantFigure'||variant==='closeFigure'?textures.faceOdd:textures.face,roughness:.55});
    const shoe = new THREE.MeshStandardMaterial({color:0x080808,roughness:.34});
    const g = new THREE.Group();
    g.position.set(x,0,z);
    g.scale.setScalar(scale);
    if(variant === 'backwardWalker') g.rotation.y = Math.PI;

    const torso = new THREE.Group();
    const pelvis = addPart(torso,new THREE.BoxGeometry(.82,.42,.42),suit,0,1.55,0);
    const body = addPart(torso,new THREE.BoxGeometry(.98,1.35,.46),suit,0,2.28,0);
    const shirtFront = addPart(torso,new THREE.BoxGeometry(.42,1.02,.03),shirt,0,2.28,.245);
    g.add(torso);

    const neck = addPart(g,new THREE.CylinderGeometry(.16,.18,.22,14),skin,0,3.05,0);
    const headGroup = new THREE.Group(); headGroup.position.y=3.45;
    const head = addPart(headGroup,new THREE.BoxGeometry(.72,.86,.68),skin,0,0,0);
    const face = new THREE.Mesh(new THREE.PlaneGeometry(.72,.86),faceMat); face.position.z=.345; headGroup.add(face);
    const hair = addPart(headGroup,new THREE.BoxGeometry(.78,.18,.72),new THREE.MeshStandardMaterial({color:0x1b1510,roughness:.8}),0,.43,0);
    g.add(headGroup);

    const armLong = variant === 'longArms' ? 1.55 : 1;
    const leftArm = makeArm(-.67,2.84,armLong,suit,skin);
    const rightArm = makeArm(.67,2.84,armLong,suit,skin);
    const leftLeg = makeLeg(-.25,1.45,suit,shoe);
    const rightLeg = makeLeg(.25,1.45,suit,shoe);
    g.add(leftArm.root,rightArm.root,leftLeg.root,rightLeg.root);
    add(g);

    humans.push({group:g,torso,body,headGroup,leftArm,rightArm,leftLeg,rightLeg,variant,speed:baseSpeed,animSpeed:variant==='fastWalker'?8.6:5.3,phase:Math.random()*6.28});
  }

  function addPart(parent,geo,mat,x,y,z){
    const m = new THREE.Mesh(geo,mat);
    m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; parent.add(m); return m;
  }

  function makeArm(x,y,long,suit,skin){
    const root = new THREE.Group(); root.position.set(x,y,0);
    const upper = new THREE.Group();
    addPart(upper,new THREE.BoxGeometry(.22,.7*long,.22),suit,0,-.35*long,0);
    const elbow = new THREE.Group(); elbow.position.y=-.72*long;
    addPart(elbow,new THREE.BoxGeometry(.2,.68*long,.2),suit,0,-.34*long,0);
    addPart(elbow,new THREE.BoxGeometry(.21,.18,.21),skin,0,-.74*long,0);
    upper.add(elbow); root.add(upper);
    return {root,upper,elbow};
  }

  function makeLeg(x,y,suit,shoeMat){
    const root = new THREE.Group(); root.position.set(x,y,0);
    const upper = new THREE.Group();
    addPart(upper,new THREE.BoxGeometry(.28,.72,.28),suit,0,-.36,0);
    const knee = new THREE.Group(); knee.position.y=-.72;
    addPart(knee,new THREE.BoxGeometry(.25,.72,.25),suit,0,-.36,0);
    const foot = new THREE.Group(); foot.position.set(0,-.78,.09);
    addPart(foot,new THREE.BoxGeometry(.32,.16,.56),shoeMat,0,0,.11);
    knee.add(foot); upper.add(knee); root.add(upper);
    return {root,upper,knee,foot};
  }
}

function applyCameraRotation(){
  const maxPitch = Math.PI/2 - .08;
  input.pitch = Math.max(-maxPitch, Math.min(maxPitch, input.pitch));
  camera.quaternion.setFromEuler(new THREE.Euler(input.pitch,input.yaw,0,'YXZ'));
}

function rotateLook(dx,dy,sens){
  const lookScale = gameData.settings.look || 1;
  input.yaw -= dx * sens * lookScale;
  input.pitch -= dy * sens * lookScale;
  applyCameraRotation();
}

function checkGate(wentForward){
  if(transitioning || cleared) return;
  transitioning = true;
  const t = $('transition');
  t.style.opacity = '1';
  playTone(wentForward?430:230,.12,.05);
  setTimeout(()=>{

    if(correct){
      if(hasAnomaly && !wentForward) recordDiscovery(anomaly);
      currentNumber++;
      if(currentNumber > gameData.best) gameData.best = currentNumber;

    buildMap();
    t.style.opacity = '0';
    transitioning = false;

}

function applyCollision(pos){
  const r = .52;
  const halfW = anomaly === 'thinCorridor' ? 5.2 : 8;
  pos.y = 3.2 + bobY;

  // L字通路を2つの長方形として扱う。
  // これで曲がり角のつまり・壁抜け・黒い謎空間への侵入をまとめて防ぐ。
  const main = {
    minX: -halfW + r,
    maxX: halfW - r,
    minZ: -39.0,
    maxZ: 39.0
  };
  const side = {
    minX: halfW - .65,
    maxX: 28.0,
    minZ: -35.0,
    maxZ: -21.0
  };

  const inRect = (p, a) => p.x >= a.minX && p.x <= a.maxX && p.z >= a.minZ && p.z <= a.maxZ;
  const clampTo = (p, a) => ({
    x: THREE.MathUtils.clamp(p.x, a.minX, a.maxX),
    z: THREE.MathUtils.clamp(p.z, a.minZ, a.maxZ)
  });

  if(inRect(pos, main) || inRect(pos, side)) return;

  const c1 = clampTo(pos, main);
  const c2 = clampTo(pos, side);
  const d1 = (pos.x-c1.x)*(pos.x-c1.x) + (pos.z-c1.z)*(pos.z-c1.z);
  const d2 = (pos.x-c2.x)*(pos.x-c2.x) + (pos.z-c2.z)*(pos.z-c2.z);
  const c = d1 <= d2 ? c1 : c2;
  pos.x = c.x;
  pos.z = c.z;
}

function updateAdaptiveQuality(dt,nowMs){
  avgFrameMs = avgFrameMs * .96 + (dt*1000) * .04;
  if(gameData.settings.quality !== 'auto') return;
  if(nowMs - lastQualityCheck < 1200) return;
  lastQualityCheck = nowMs;
  if(avgFrameMs > 25 && qualityStep < 2){
    qualityStep++;
    const ratio = qualityStep === 1 ? 1.15 : 1.0;
    renderer.setPixelRatio(Math.min(devicePixelRatio, ratio));
    renderer.shadowMap.enabled = false;
  }else if(avgFrameMs < 18 && qualityStep > 0){
    qualityStep--;
    applySettings();
  }
}

function updateMovement(dt,now){
  const keyMove = input.f || input.b || input.l || input.r;
  const analogMove = input.joyPointer !== null && (Math.abs(input.joyX) > .06 || Math.abs(input.joyY) > .06);
  const moving = keyMove || analogMove;
  const baseSpeed = anomaly === 'lowCeiling' ? 4.2 : 6.55;

  reusable.forward.set(0,0,-1).applyQuaternion(camera.quaternion); reusable.forward.y=0; reusable.forward.normalize();
  reusable.right.set(1,0,0).applyQuaternion(camera.quaternion); reusable.right.y=0; reusable.right.normalize();
  reusable.move.set(0,0,0);

  if(analogMove){
    reusable.move.addScaledVector(reusable.forward, THREE.MathUtils.clamp(-input.joyY, -1, 1));
    reusable.move.addScaledVector(reusable.right, THREE.MathUtils.clamp(input.joyX, -1, 1));
  }else{
    if(input.f) reusable.move.add(reusable.forward);
    if(input.b) reusable.move.sub(reusable.forward);
    if(input.r) reusable.move.add(reusable.right);
    if(input.l) reusable.move.sub(reusable.right);
  }

  if(reusable.move.lengthSq()>1) reusable.move.normalize();
  reusable.move.multiplyScalar(baseSpeed*dt);

  // X/Zを分ける＋最後にもう一度補正。角で止まりにくく、壁抜けもしにくい。
  camera.position.x += reusable.move.x;
  applyCollision(camera.position);
  camera.position.z += reusable.move.z;
  applyCollision(camera.position);

  if(moving){
    walkClock += dt * (analogMove ? 9.2 : 10.5);
    const stepWave = Math.sin(walkClock);
    bobY += (stepWave * .085 - bobY) * Math.min(1, dt*12);
    if(stepWave > .93 && now-lastStep>.25){ playStep(); lastStep=now; }
  }else{
    bobY += (0 - bobY) * Math.min(1, dt*9);
  }

  if(shakePower>0){
    camera.position.x += (Math.random()-.5)*shakePower;
    camera.position.y += (Math.random()-.5)*shakePower;
  }
  applyCollision(camera.position);

  if(camera.position.x > 25.8 && camera.position.z < -23.2) checkGate(true);
  else if(camera.position.z > 37.2) checkGate(false);
}

function animate(){
  requestAnimationFrame(animate);
  const nowMs = performance.now();
  const dt = Math.min(.05,(nowMs-lastTime)/1000);
  lastTime = nowMs;
  const t = nowMs/1000;
  if(running && !transitioning){
    if(horrorPulse > 0){
      horrorPulse = Math.max(0,horrorPulse - dt*1.6);
      camera.position.x += (Math.random()-.5)*horrorPulse*.035;
      camera.position.y += (Math.random()-.5)*horrorPulse*.025;
    }
    updateMovement(dt,t);
    for(const fn of updaters) fn(t,dt);
    updateAdaptiveQuality(dt, nowMs);
    if(anomaly === 'warpedView'){
      camera.rotation.z = Math.sin(t*1.7)*.035;
    }
  }
  renderer.render(scene,camera);
}

function setupInput(){
  const keyMap = {KeyW:'f',ArrowUp:'f',KeyS:'b',ArrowDown:'b',KeyA:'l',ArrowLeft:'l',KeyD:'r',ArrowRight:'r'};
  addEventListener('keydown',(e)=>{
    if(e.code==='Escape'){ pauseGame(); return; }
    if(keyMap[e.code]){ input[keyMap[e.code]]=true; e.preventDefault(); }
  });
  addEventListener('keyup',(e)=>{ if(keyMap[e.code]){ input[keyMap[e.code]]=false; e.preventDefault(); } });
  document.addEventListener('pointerlockchange',()=>{
    if(started && running && !isTouchDevice && document.pointerLockElement !== renderer.domElement) pauseGame();
  });
  addEventListener('mousemove',(e)=>{
    if(!running || isTouchDevice) return;
    if(document.pointerLockElement === renderer.domElement) rotateLook(e.movementX,e.movementY,.0021);
    else if(input.dragging) rotateLook(e.clientX-input.mouseX,e.clientY-input.mouseY,.003);
    input.mouseX=e.clientX; input.mouseY=e.clientY;
  });
  renderer.domElement.addEventListener('mousedown',(e)=>{ if(!running||isTouchDevice) return; input.dragging=true; input.mouseX=e.clientX; input.mouseY=e.clientY; });
  addEventListener('mouseup',()=>{ input.dragging=false; });

  const joy = $('joyWrap');
  const knob = $('joyKnob');
  joy.addEventListener('pointerdown',(e)=>{
    if(!running || input.joyPointer!==null) return;
    e.preventDefault(); e.stopPropagation();
    input.joyPointer = e.pointerId;
    joy.setPointerCapture(e.pointerId);
    const rect = joy.getBoundingClientRect();
    input.joyCenterX = rect.left + rect.width/2;
    input.joyCenterY = rect.top + rect.height/2;
    updateJoy(e.clientX,e.clientY);
  });
  joy.addEventListener('pointermove',(e)=>{ if(e.pointerId===input.joyPointer){ e.preventDefault(); updateJoy(e.clientX,e.clientY); } });
  joy.addEventListener('pointerup',(e)=>{ if(e.pointerId===input.joyPointer) resetJoystick(); });
  joy.addEventListener('pointercancel',(e)=>{ if(e.pointerId===input.joyPointer) resetJoystick(); });

  function updateJoy(x,y){
    const max = 43;
    let dx = x-input.joyCenterX;
    let dy = y-input.joyCenterY;
    const len = Math.hypot(dx,dy);
    if(len>max){ dx = dx/len*max; dy = dy/len*max; }
    knob.style.transform = 'translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';
    input.joyX = dx/max; input.joyY = dy/max;
    const dead = .22;
    input.f = input.joyY < -dead;
    input.b = input.joyY > dead;
    input.l = input.joyX < -dead;
    input.r = input.joyX > dead;
  }

  const look = $('lookPad');
  look.addEventListener('pointerdown',(e)=>{
    if(!running || input.lookPointer!==null) return;
    e.preventDefault();
    input.lookPointer = e.pointerId;
    input.lookX = e.clientX; input.lookY = e.clientY;
    look.setPointerCapture(e.pointerId);
  });
  look.addEventListener('pointermove',(e)=>{
    if(e.pointerId!==input.lookPointer || !running) return;
    e.preventDefault();
    rotateLook(e.clientX-input.lookX,e.clientY-input.lookY,.0044);
    input.lookX=e.clientX; input.lookY=e.clientY;
  });
  const stopLook = (e)=>{ if(e.pointerId===input.lookPointer) input.lookPointer=null; };
  look.addEventListener('pointerup',stopLook);
  look.addEventListener('pointercancel',stopLook);

  $('startBtn').addEventListener('click',startGame);
  $('resumeBtn').addEventListener('click',resumeGame);
  $('pauseBtn').addEventListener('click',(e)=>{ e.preventDefault(); e.stopPropagation(); pauseGame(); });
  $('restartBtn').addEventListener('click',()=>location.reload());
  $('zukanBtn').addEventListener('click',openZukan);
  $('closeZukanBtn').addEventListener('click',closeZukan);
  $('zukanModal').addEventListener('click',(e)=>{ if(e.target.id === 'zukanModal') closeZukan(); });
  document.querySelectorAll('[data-mode]').forEach(btn=>btn.addEventListener('click',()=>{ gameMode = btn.dataset.mode; gameData.settings.mode = gameMode; currentNumber = 0; saveGameData(); buildMap(); updateMenuUI(); }));
  $('qualitySelect').addEventListener('change',(e)=>{ gameData.settings.quality = e.target.value; saveGameData(); applySettings(); updateMenuUI(); });
  $('horrorSelect').addEventListener('change',(e)=>{ gameData.settings.horror = Number(e.target.value); saveGameData(); updateMenuUI(); });
  $('lookRange').addEventListener('input',(e)=>{ gameData.settings.look = Number(e.target.value); saveGameData(); updateMenuUI(); });
  $('joyRange').addEventListener('input',(e)=>{ gameData.settings.joy = Number(e.target.value); saveGameData(); applySettings(); updateMenuUI(); });
  $('resetSaveBtn').addEventListener('click',()=>{ gameData.clears=0; gameData.best=0; gameData.seen={}; saveGameData(); updateMenuUI(); renderZukan(); showFlash('記録をリセットしました'); });
}

function resetJoystick(){
  input.joyPointer = null;
  input.lookPointer = null;
  input.f = input.b = input.l = input.r = false;
  input.joyX = input.joyY = 0;
  $('joyKnob').style.transform = 'translate(-50%,-50%)';
}

function boot(){
  loadGameData();
  makeTextures();
  initThree();
  setupInput();
  applySettings();
  updateMenuUI();
  buildMap();
  animate();
}

boot();
})();
</script>
</body>
</html>
