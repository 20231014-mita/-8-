<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>8番出口 - Final Complete Edition</title>
<style>
:root{--bg:#050505;--panel:rgba(9,10,11,.86);--line:rgba(255,255,255,.18);--txt:#f5f5ef;--muted:#b9b7ae;--accent:#f6d36b;--danger:#ff5555}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#000;color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;touch-action:none}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;inset:0;z-index:8;pointer-events:none}
#vignette{position:absolute;inset:0;box-shadow:inset 0 0 90px rgba(0,0,0,.62),inset 0 0 22px rgba(0,0,0,.4)}
#grain{position:absolute;inset:-30%;opacity:.04;background-image:radial-gradient(circle,#fff 0 1px,transparent 1px);background-size:5px 5px;animation:grain 1.1s steps(4) infinite}
@keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(1%,2%)}50%{transform:translate(-1%,1%)}75%{transform:translate(2%,-1%)}100%{transform:translate(0,0)}}
#crosshair{position:absolute;left:50%;top:50%;width:14px;height:14px;transform:translate(-50%,-50%);border:1px solid rgba(255,255,255,.45);border-radius:50%;opacity:.72}
#crosshair:after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;transform:translate(-50%,-50%);border-radius:50%;background:rgba(255,255,255,.55)}
#hud{position:absolute;left:calc(14px + env(safe-area-inset-left));top:calc(14px + env(safe-area-inset-top));min-width:132px;padding:10px 12px;border:1px solid var(--line);border-radius:16px;background:rgba(0,0,0,.42);backdrop-filter:blur(10px);font-weight:1000;text-shadow:0 2px 8px #000;letter-spacing:.06em}
#hud small{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:0}
#dots{display:flex;gap:4px;margin-top:8px}.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.22)}.dot.on{background:var(--accent);box-shadow:0 0 12px rgba(246,211,107,.5)}.dot.clear{background:#fff;box-shadow:0 0 12px rgba(255,255,255,.5)}
#message{position:absolute;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);max-width:min(760px,92vw);padding:10px 15px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(0,0,0,.42);backdrop-filter:blur(10px);font-size:13px;text-align:center;transition:.2s}
#gateHint{position:fixed;left:50%;bottom:calc(64px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:15;padding:8px 13px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(0,0,0,.45);font-size:12px;font-weight:900;pointer-events:none}
#flash{position:fixed;left:50%;top:22%;z-index:18;transform:translateX(-50%);padding:10px 16px;border-radius:999px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(10px);font-weight:900;opacity:0;transition:.22s;pointer-events:none;text-align:center}
#panic{position:fixed;inset:0;z-index:17;background:radial-gradient(circle,rgba(255,0,0,.20),rgba(0,0,0,0) 58%);opacity:0;pointer-events:none;transition:.12s}
#scare{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(120,0,0,.50),rgba(0,0,0,.96) 62%,#000);pointer-events:none;overflow:hidden}
#scare.show{display:flex;animation:shake .12s steps(2) infinite}@keyframes shake{0%{transform:translate(0,0)}25%{transform:translate(8px,-5px)}50%{transform:translate(-7px,4px)}75%{transform:translate(5px,7px)}100%{transform:translate(0,0)}}
.scareText{font-size:clamp(32px,9vw,76px);font-weight:1000;letter-spacing:.16em;color:#fff;text-shadow:0 0 10px #f00,0 0 28px #a00000;animation:glitch .18s steps(2) infinite}@keyframes glitch{0%{transform:translateX(-2px)}50%{transform:translateX(3px)}100%{transform:translateX(0)}}
.scareSub{margin-top:10px;color:#ffb5b5;font-size:14px;font-weight:900;letter-spacing:.2em;text-align:center}
#transition{position:fixed;inset:0;z-index:25;background:#000;opacity:0;pointer-events:none;transition:opacity .25s}
#overlay{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at center,rgba(25,26,27,.95),rgba(0,0,0,.97))}
.card{width:min(760px,96vw);max-height:calc(100vh - 44px);overflow:auto;border:1px solid rgba(255,255,255,.18);border-radius:28px;background:linear-gradient(180deg,rgba(28,30,31,.92),rgba(6,7,8,.9));box-shadow:0 28px 80px rgba(0,0,0,.58);padding:28px;text-align:center;position:relative}
.card:before{content:"";position:absolute;left:-20%;right:-20%;top:-2px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.card h1{margin:0 0 6px;font-size:clamp(34px,8vw,66px);font-weight:1000;letter-spacing:.14em}.card h2{margin:0 0 18px;color:var(--muted);font-size:13px;font-weight:900;letter-spacing:.12em}
.ruleBox{display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:left;margin:18px 0}.rule{border:1px solid rgba(255,255,255,.13);border-radius:18px;background:rgba(0,0,0,.28);padding:14px;line-height:1.65;color:#ddd;font-size:14px}.rule b{color:var(--accent)}
.key{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:26px;margin:2px;padding:0 8px;border-radius:8px;background:#242424;border:1px solid #444;box-shadow:inset 0 -2px #111;font-family:ui-monospace,Menlo,monospace;font-weight:900;color:#fff}
.menu{margin:16px 0 6px;padding:14px;border:1px solid rgba(255,255,255,.13);border-radius:18px;background:rgba(0,0,0,.24);text-align:left}.menuTitle{font-size:13px;color:var(--muted);font-weight:900;margin-bottom:8px;letter-spacing:.08em}
.choiceRow{display:flex;gap:8px;flex-wrap:wrap}.choice{border:1px solid rgba(255,255,255,.20);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;padding:9px 12px;font-weight:900;cursor:pointer}.choice.active{background:linear-gradient(180deg,#fff4c1,#f3c846);color:#111;border-color:transparent}
.settingGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.settingGrid label{font-size:12px;color:#ddd;display:flex;flex-direction:column;gap:5px}.settingGrid select,.settingGrid input{width:100%;accent-color:#f3c846}
.mainBtn{width:min(360px,86vw);margin:14px auto 0;padding:16px 18px;border:0;border-radius:18px;background:linear-gradient(180deg,#fff4c1,#f3c846);color:#111;font-size:19px;font-weight:1000;letter-spacing:.06em;box-shadow:0 14px 35px rgba(248,211,106,.18);cursor:pointer}.subBtn{margin-top:12px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#fff;border-radius:14px;padding:10px 14px;font-weight:900;cursor:pointer}
#saveInfo{margin-top:10px;color:#bfbfb5;font-size:12px;line-height:1.6}.notice{margin-top:12px;color:#96968e;font-size:12px;line-height:1.6}
#pause{position:fixed;right:calc(16px + env(safe-area-inset-right));top:calc(16px + env(safe-area-inset-top));z-index:14;width:54px;height:54px;border-radius:999px;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.38);color:#fff;font-size:22px;display:none;align-items:center;justify-content:center;pointer-events:auto;backdrop-filter:blur(10px)}
#lookPad{position:fixed;right:0;top:0;width:58%;height:100%;z-index:9;display:none;pointer-events:auto}#joy{position:fixed;left:calc(26px + env(safe-area-inset-left));bottom:calc(34px + env(safe-area-inset-bottom));z-index:12;width:132px;height:132px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:radial-gradient(circle,rgba(255,255,255,.14),rgba(255,255,255,.04));box-shadow:0 16px 40px rgba(0,0,0,.35),inset 0 0 25px rgba(255,255,255,.04);display:none;pointer-events:auto;touch-action:none}#knob{position:absolute;left:50%;top:50%;width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.62);box-shadow:0 8px 20px rgba(0,0,0,.35);transform:translate(-50%,-50%);pointer-events:none}
body.mobile #joy,body.mobile #lookPad,body.mobile #pause{display:flex}body:not(.running) #joy,body:not(.running) #lookPad,body:not(.running) #pause{display:none!important}body.horror #vignette{box-shadow:inset 0 0 150px rgba(0,0,0,.88),inset 0 0 42px rgba(90,0,0,.55)}body.lowfx #grain{display:none!important}
#clear{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle,#f8f8f2,#a9aaa6);color:#080808;padding:22px}#clear h1{font-size:clamp(46px,12vw,98px);margin:0;letter-spacing:.16em}#clear p{font-size:20px;color:#444;font-weight:900}#clear button{padding:14px 26px;border:0;border-radius:16px;background:#111;color:#fff;font-weight:900;font-size:17px}
.modal{position:fixed;inset:0;z-index:45;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.72);backdrop-filter:blur(10px)}.modal.show{display:flex}.modalCard{width:min(780px,96vw);max-height:86vh;overflow:auto;border:1px solid rgba(255,255,255,.18);border-radius:24px;background:rgba(13,14,15,.94);padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.6)}.modalTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.modalTop h3{margin:0;font-size:22px;letter-spacing:.08em}.zukanGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:9px}.zukanItem{border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px;background:rgba(255,255,255,.045);font-size:13px;line-height:1.5}.zukanItem.locked{opacity:.45;filter:grayscale(1)}.tag{display:inline-block;margin-top:4px;padding:2px 7px;border-radius:999px;background:rgba(248,211,106,.16);color:#ffe59a;font-size:11px;font-weight:900}
@media(max-width:640px){.card{padding:22px 18px}.ruleBox{grid-template-columns:1fr}.rule{font-size:13px}.settingGrid{grid-template-columns:1fr}#message{display:none}#hud{font-size:13px;max-width:172px}#joy{width:122px;height:122px;left:18px;bottom:28px;transform-origin:left bottom}#knob{width:54px;height:54px}.subBtn{padding:9px 11px;font-size:13px}}
</style>
</head>
<body>
<div id="transition"></div>
<div id="ui"><div id="grain"></div><div id="vignette"></div><div id="crosshair"></div><div id="hud">通路 <span id="floorNum">0</span><small id="hudSmall">異変を確認してください</small><div id="dots"></div></div><div id="message">異変があれば戻る。なければ進む。8つ目の出口を目指してください。</div></div>
<div id="gateHint">奥＝進む / 後ろ＝戻る</div><div id="flash"></div><div id="panic"></div><div id="scare"><div><div class="scareText">捕まった</div><div class="scareSub">0番へ戻される</div></div></div>
<div id="lookPad"></div><div id="pause">Ⅱ</div><div id="joy"><div id="knob"></div></div>
<div id="overlay"><div class="card"><h1>異変回廊</h1><h2>Final Complete Edition</h2><div class="ruleBox"><div class="rule"><b>ルール</b><br>いつもと違う異変を見つけたら引き返す。異変がなければ奥の出口へ進みます。間違えると0に戻ります。</div><div class="rule"><b>操作</b><br>PC：<span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>で移動、マウスで視点。<br>スマホ：左パッドで移動、右画面スワイプで視点。</div></div><div class="menu"><div class="menuTitle">難易度</div><div class="choiceRow"><button class="choice active" data-mode="normal">ノーマル</button><button class="choice" data-mode="hard">ハード</button><button class="choice" data-mode="horror">ホラー</button></div><div class="settingGrid"><label>画質<select id="quality"><option value="auto">自動</option><option value="low">低</option><option value="mid">中</option><option value="high">高</option></select></label><label>視点感度<input id="lookSpeed" type="range" min="0.6" max="1.7" value="1" step="0.05"></label><label>パッドサイズ<input id="joySize" type="range" min="0.85" max="1.35" value="1" step="0.05"></label><label>ホラー演出<select id="horrorPower"><option value="0.65">弱め</option><option value="1">普通</option><option value="1.25">強め</option></select></label></div><div id="saveInfo"></div></div><button id="start" class="mainBtn">ゲーム開始</button><button id="resume" class="subBtn" style="display:none">続ける</button><button id="zukan" class="subBtn">異変図鑑</button><button id="reset" class="subBtn">記録リセット</button><div class="notice">ベンチ・ポスター・案内板は残し、通路・照明・おじさんのモーションまで含めて整理した最終完全版です。</div></div></div>
<div id="clear"><div><h1>脱出成功</h1><p>あなたは正しい出口を見つけました。</p><button id="restart">もう一度プレイ</button></div></div>
<div id="zukanModal" class="modal"><div class="modalCard"><div class="modalTop"><h3>異変図鑑</h3><button id="closeZukan" class="subBtn">閉じる</button></div><div id="zukanGrid" class="zukanGrid"></div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(()=>{
'use strict';
const $=id=>document.getElementById(id);
const isMobile=matchMedia('(pointer: coarse)').matches||'ontouchstart' in window;
if(isMobile)document.body.classList.add('mobile');
const SAVE_KEY='clean_corridor_complete_v1';
const APP_VERSION='clean_final_complete_2026_05_22';
const anomalyNames={wrongSign:'番号違いの看板',invertedPoster:'逆さポスター',redLight:'赤い照明',missingSign:'消えた看板',floorArrow:'床の赤い矢印',cameraTrack:'追尾する防犯カメラ',oldManStare:'見つめるおじさん',subtleTile:'微妙に違うタイル',shadowFigure:'壁の影',tileMan:'壁から出るタイルマン',blackout:'暗転する通路'};
const anomalyHints={wrongSign:'通路番号や出口表示を見る。',invertedPoster:'ポスターの上下を見る。',redLight:'照明の色を見る。',missingSign:'いつもの案内板があるか見る。',floorArrow:'床に赤い矢印がないか見る。',cameraTrack:'防犯カメラが自分を追っていないか見る。',oldManStare:'おじさんの目線を見る。',subtleTile:'床や壁の一部だけ色が違わないか見る。',shadowFigure:'壁に変な人影がないか見る。',tileMan:'奥の壁が人型に動かないか見る。',blackout:'急に暗くならないか見る。'};
const easy=['wrongSign','invertedPoster','redLight','missingSign','floorArrow'];
const mid=['cameraTrack','oldManStare','subtleTile','shadowFigure'];
const horror=['tileMan','blackout'];
let data={version:APP_VERSION,clears:0,best:0,seen:{},seenCounts:{},records:{normal:null,hard:null,horror:null},settings:{mode:'normal',quality:'auto',look:1,joy:1,horror:1}};
let mode='normal',scene,camera,renderer,ambient,fog,audioCtx=null,humGain=null;
let running=false,started=false,transitioning=false,cleared=false,current=0,hasAnomaly=false,anomaly=null;
let last=performance.now(),walkClock=0,bobY=0,lastStep=0,qualityStep=0,avgFrameMs=16.7,lastQualityCheck=0,horrorPulse=0;
const objects=[],updaters=[],textures={};
let tmp=null;
const input={f:false,b:false,l:false,r:false,yaw:0,pitch:0,drag:false,mouseX:0,mouseY:0,joyPointer:null,lookPointer:null,joyX:0,joyY:0,joyCX:0,joyCY:0,lookX:0,lookY:0};
function load(){try{const raw=localStorage.getItem(SAVE_KEY);if(raw)data=Object.assign(data,JSON.parse(raw)||{})}catch(e){}data.version=APP_VERSION;data.seen=data.seen||{};data.seenCounts=data.seenCounts||{};data.records=Object.assign({normal:null,hard:null,horror:null},data.records||{});data.settings=Object.assign({mode:'normal',quality:'auto',look:1,joy:1,horror:1},data.settings||{});mode=data.settings.mode;save()}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(data))}catch(e){}}
function updateMenu(){document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('quality').value=data.settings.quality;$('lookSpeed').value=data.settings.look;$('joySize').value=data.settings.joy;$('horrorPower').value=String(data.settings.horror);const seen=Object.keys(data.seen).length,total=Object.keys(anomalyNames).length;const fmt=v=>v?((v/1000).toFixed(1)+'秒'):'未達成';$('saveInfo').innerHTML='クリア回数：'+data.clears+' / 最高到達：'+data.best+' / 発見：'+seen+' / '+total+'<br>最速：N '+fmt(data.records.normal)+' / H '+fmt(data.records.hard)+' / Horror '+fmt(data.records.horror)}
function record(name){if(!name)return;data.seen[name]=true;data.seenCounts[name]=(data.seenCounts[name]||0)+1;data.best=Math.max(data.best,current);save();updateMenu()}
function showFlash(text,danger=false){const el=$('flash');el.textContent=text;el.style.color=danger?'#ffdddd':'#fff';el.style.borderColor=danger?'rgba(255,80,80,.45)':'rgba(255,255,255,.18)';el.style.opacity='1';clearTimeout(showFlash.t);showFlash.t=setTimeout(()=>el.style.opacity='0',1400)}
function panic(amount=.6){amount*=Number(data.settings.horror||1);horrorPulse=Math.max(horrorPulse,amount);$('panic').style.opacity=String(Math.min(.55,amount));clearTimeout(panic.t);panic.t=setTimeout(()=>$('panic').style.opacity='0',120)}
function canvasTexture(w,h,draw){const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');draw(ctx,w,h);const tex=new THREE.CanvasTexture(c);tex.anisotropy=4;tex.needsUpdate=true;return tex}
function makeTextures(){

function buildAnomalyDetails(halfW,ceilingH){if(anomaly==='floorArrow'){const red=new THREE.MeshBasicMaterial({color:0x8b0000,transparent:true,opacity:.82});plane(1,6,red,0,.06,-7,-Math.PI/2);const head=new THREE.Mesh(new THREE.CircleGeometry(1.25,3),red);head.position.set(0,.07,-2);head.rotation.x=-Math.PI/2;head.rotation.z=Math.PI;add(head)}if(anomaly==='subtleTile')plane(2.05,2.05,new THREE.MeshBasicMaterial({color:0xbbb3a6,transparent:true,opacity:.24}),2.05,.071,-4.2,-Math.PI/2);if(anomaly==='shadowFigure'){const sh=new THREE.Mesh(new THREE.PlaneGeometry(1.4,3.6),new THREE.MeshBasicMaterial({color:0x000,transparent:true,opacity:.62}));sh.position.set(-halfW+.06,2,-30);sh.rotation.y=Math.PI/2;add(sh);updaters.push(t=>{sh.position.z=-30+Math.sin(t*1.4)*4;sh.material.opacity=.38+Math.abs(Math.sin(t*1.8))*.34})}if(anomaly==='blackout'){ambient.intensity=.06;fog.far=18;updaters.push(t=>{if(Math.sin(t*3)>.94)panic(.3)})}if(anomaly==='tileMan')buildTileMan(ceilingH)}
function buildTileMan(ceilingH){const tile=mat({map:textures.wall,roughness:.92,color:0xd3d0c8}),eye=new THREE.MeshBasicMaterial({color:0x7a0000}),dark=mat({color:0x111});const g=new THREE.Group();g.position.set(0,0,-36.2);g.scale.set(1.05,1.05,.12);g.userData.active=false;function p(geo,x,y,z,material=tile){const m=new THREE.Mesh(geo,material);m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;g.add(m);return m}p(new THREE.BoxGeometry(1.1,1.55,.52),0,2.25,0);p(new THREE.BoxGeometry(.92,.92,.52),0,3.38,0);const eyeL=p(new THREE.SphereGeometry(.075,16,12),-.22,3.43,.30,eye),eyeR=p(new THREE.SphereGeometry(.075,16,12),.22,3.43,.30,eye),mouth=p(new THREE.BoxGeometry(.36,.035,.035),0,3.20,.31,dark);eyeL.visible=eyeR.visible=mouth.visible=false;function limb(x,y){const r=new THREE.Group();r.position.set(x,y,0);const a=new THREE.Mesh(new THREE.BoxGeometry(.28,.95,.28),tile);a.position.y=-.45;a.castShadow=true;a.receiveShadow=true;r.add(a);g.add(r);return r}g.userData.armL=limb(-.76,2.85);g.userData.armR=limb(.76,2.85);g.userData.legL=limb(-.34,1.48);g.userData.legR=limb(.34,1.48);add(g);updaters.push((t,dt)=>{const dist=g.position.distanceTo(camera.position);if(!g.userData.active&&(dist<11.5||camera.position.z<-24)){g.userData.active=true;eyeL.visible=eyeR.visible=mouth.visible=true;showFlash('壁が動いた',true);panic(.9);playTone(58,.25,.10)}if(!g.userData.active){g.rotation.z=Math.sin(t*1.4)*.006;return}tmp.v.copy(camera.position).sub(g.position);tmp.v.y=0;if(tmp.v.lengthSq()>.01){tmp.v.normalize();g.position.addScaledVector(tmp.v,dt*3.2)}g.lookAt(camera.position.x,g.position.y,camera.position.z);animateTileMan(g,t);if(dist<8)panic(.45);if(dist<2.0)scareReset('タイルマンに追いつかれました。0に戻ります。')})}
function animateTileMan(g,t){const a=Math.sin(t*7),b=Math.sin(t*7+Math.PI);g.userData.armL.rotation.x=a*.7;g.userData.armR.rotation.x=b*.7;g.userData.legL.rotation.x=b*.55;g.userData.legR.rotation.x=a*.55;g.position.y=Math.abs(Math.sin(t*7))*.035;g.rotation.z=Math.sin(t*3)*.025}
function initAudio(){if(audioCtx){if(audioCtx.state==='suspended')audioCtx.resume();return}audioCtx=new(window.AudioContext||window.webkitAudioContext)();const osc=audioCtx.createOscillator(),filter=audioCtx.createBiquadFilter();humGain=audioCtx.createGain();osc.type='sawtooth';osc.frequency.value=58;filter.type='lowpass';filter.frequency.value=170;humGain.gain.value=.028;osc.connect(filter);filter.connect(humGain);humGain.connect(audioCtx.destination);osc.start()}
function playStep(){if(!audioCtx||audioCtx.state!=='running')return;const t=audioCtx.currentTime,osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.type='triangle';osc.frequency.setValueAtTime(110+Math.random()*20,t);osc.frequency.exponentialRampToValueAtTime(44,t+.11);gain.gain.setValueAtTime(.0001,t);gain.gain.exponentialRampToValueAtTime(.13,t+.012);gain.gain.exponentialRampToValueAtTime(.006,t+.16);osc.connect(gain);gain.connect(audioCtx.destination);osc.start(t);osc.stop(t+.18)}
function playTone(freq=300,dur=.15,vol=.06){if(!audioCtx||audioCtx.state!=='running')return;const t=audioCtx.currentTime,osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.type='sine';osc.frequency.setValueAtTime(freq,t);gain.gain.setValueAtTime(vol,t);gain.gain.exponentialRampToValueAtTime(.001,t+dur);osc.connect(gain);gain.connect(audioCtx.destination);osc.start(t);osc.stop(t+dur)}
function applyCameraRotation(){const max=Math.PI/2-.08;input.pitch=Math.max(-max,Math.min(max,input.pitch));camera.quaternion.setFromEuler(new THREE.Euler(input.pitch,input.yaw,0,'YXZ'))}
function rotateLook(dx,dy,sens){const s=Number(data.settings.look||1);input.yaw-=dx*sens*s;input.pitch-=dy*sens*s;applyCameraRotation()}
function startGame(){initAudio();started=true;running=true;document.body.classList.add('running');$('overlay').style.display='none';$('resume').style.display='inline-block';if(!isMobile&&renderer.domElement.requestPointerLock){try{renderer.domElement.requestPointerLock()}catch(e){}}showFlash('開始しました')}

function checkGate(forward){if(transitioning||cleared)return;transitioning=true;resetJoy();$('transition').style.opacity='1';playTone(forward?430:230,.12,.05);setTimeout(()=>{const correct=forward===!hasAnomaly;if(correct){if(hasAnomaly&&!forward)record(anomaly);current++;data.best=Math.max(data.best,current);save();showFlash(forward?'進みました':'戻りました')}else{current=0;showFlash('間違えました。0に戻ります。',true);playTone(92,.28,.08)}if(current>8){clearGame();return}buildMap();$('transition').style.opacity='0';transitioning=false},330)}

function updateMovement(dt,t){const analog=input.joyPointer!==null&&(Math.abs(input.joyX)>.06||Math.abs(input.joyY)>.06);const key=input.f||input.b||input.l||input.r;const moving=analog||key;tmp.forward.set(0,0,-1).applyQuaternion(camera.quaternion);tmp.forward.y=0;tmp.forward.normalize();tmp.right.set(1,0,0).applyQuaternion(camera.quaternion);tmp.right.y=0;tmp.right.normalize();tmp.move.set(0,0,0);if(analog){tmp.move.addScaledVector(tmp.forward,THREE.MathUtils.clamp(-input.joyY,-1,1));tmp.move.addScaledVector(tmp.right,THREE.MathUtils.clamp(input.joyX,-1,1))}else{if(input.f)tmp.move.add(tmp.forward);if(input.b)tmp.move.sub(tmp.forward);if(input.r)tmp.move.add(tmp.right);if(input.l)tmp.move.sub(tmp.right)}if(tmp.move.lengthSq()>1)tmp.move.normalize();tmp.move.multiplyScalar(6.55*dt);camera.position.x+=tmp.move.x;camera.position.z+=tmp.move.z;camera.position.x=THREE.MathUtils.clamp(camera.position.x,-7.1,7.1);camera.position.z=THREE.MathUtils.clamp(camera.position.z,-39,39);if(moving){walkClock+=dt*10;const w=Math.sin(walkClock);bobY+=(w*.085-bobY)*Math.min(1,dt*12);if(w>.93&&t-lastStep>.25){playStep();lastStep=t}}else bobY+=(0-bobY)*Math.min(1,dt*9);camera.position.y=3.2+bobY;if(horrorPulse>0){horrorPulse=Math.max(0,horrorPulse-dt*1.6);camera.position.x+=(Math.random()-.5)*horrorPulse*.035;camera.position.y+=(Math.random()-.5)*horrorPulse*.025}if(camera.position.z<-34)$('gateHint').textContent='進む判定エリア';else if(camera.position.z>34)$('gateHint').textContent='戻る判定エリア';else $('gateHint').textContent='奥＝進む / 後ろ＝戻る';if(camera.position.z<-37.2)checkGate(true);else if(camera.position.z>37.2)checkGate(false)}
function updateQuality(dt,now){avgFrameMs=avgFrameMs*.96+(dt*1000)*.04;if(data.settings.quality!=='auto'||now-lastQualityCheck<1200)return;lastQualityCheck=now;if(avgFrameMs>25&&qualityStep<2){qualityStep++;renderer.setPixelRatio(qualityStep===1?1.05:.9);renderer.shadowMap.enabled=false;document.body.classList.add('lowfx')}else if(avgFrameMs<18&&qualityStep>0){qualityStep--;applySettings()}}
function animate(){requestAnimationFrame(animate);if(!renderer)return;const now=performance.now(),dt=Math.min(.05,(now-last)/1000);last=now;const t=now/1000;if(running&&!transitioning){updateMovement(dt,t);for(const fn of updaters)fn(t,dt);updateQuality(dt,now);renderer.render(scene,camera)}else{renderer.render(scene,camera)}}
function setupInput(){const map={KeyW:'f',ArrowUp:'f',KeyS:'b',ArrowDown:'b',KeyA:'l',ArrowLeft:'l',KeyD:'r',ArrowRight:'r'};addEventListener('keydown',e=>{if(e.code==='Escape'){pauseGame();return}if(map[e.code]){input[map[e.code]]=true;e.preventDefault()}});addEventListener('keyup',e=>{if(map[e.code]){input[map[e.code]]=false;e.preventDefault()}});document.addEventListener('pointerlockchange',()=>{if(started&&running&&!isMobile&&document.pointerLockElement!==renderer.domElement)pauseGame()});addEventListener('mousemove',e=>{if(!running||isMobile)return;if(document.pointerLockElement===renderer.domElement)rotateLook(e.movementX,e.movementY,.0021);else if(input.drag)rotateLook(e.clientX-input.mouseX,e.clientY-input.mouseY,.003);input.mouseX=e.clientX;input.mouseY=e.clientY});renderer.domElement.addEventListener('mousedown',e=>{if(!running||isMobile)return;input.drag=true;input.mouseX=e.clientX;input.mouseY=e.clientY});addEventListener('mouseup',()=>input.drag=false);const joy=$('joy'),knob=$('knob');joy.addEventListener('pointerdown',e=>{if(!running||input.joyPointer!==null)return;e.preventDefault();input.joyPointer=e.pointerId;joy.setPointerCapture(e.pointerId);const r=joy.getBoundingClientRect();input.joyCX=r.left+r.width/2;input.joyCY=r.top+r.height/2;updateJoy(e.clientX,e.clientY)});joy.addEventListener('pointermove',e=>{if(e.pointerId===input.joyPointer){e.preventDefault();updateJoy(e.clientX,e.clientY)}});joy.addEventListener('pointerup',e=>{if(e.pointerId===input.joyPointer)resetJoy()});joy.addEventListener('pointercancel',e=>{if(e.pointerId===input.joyPointer)resetJoy()});function updateJoy(x,y){const max=43;let dx=x-input.joyCX,dy=y-input.joyCY;const len=Math.hypot(dx,dy);if(len>max){dx=dx/len*max;dy=dy/len*max}knob.style.transform='translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';input.joyX=dx/max;input.joyY=dy/max;const dead=.22;input.f=input.joyY<-dead;input.b=input.joyY>dead;input.l=input.joyX<-dead;input.r=input.joyX>dead}const look=$('lookPad');look.addEventListener('pointerdown',e=>{if(!running||input.lookPointer!==null)return;e.preventDefault();input.lookPointer=e.pointerId;input.lookX=e.clientX;input.lookY=e.clientY;look.setPointerCapture(e.pointerId)});look.addEventListener('pointermove',e=>{if(e.pointerId!==input.lookPointer||!running)return;e.preventDefault();rotateLook(e.clientX-input.lookX,e.clientY-input.lookY,.0044);input.lookX=e.clientX;input.lookY=e.clientY});const stop=e=>{if(e.pointerId===input.lookPointer)input.lookPointer=null};look.addEventListener('pointerup',stop);look.addEventListener('pointercancel',stop);$('start').addEventListener('click',startGame);$('resume').addEventListener('click',startGame);$('pause').addEventListener('click',e=>{e.preventDefault();pauseGame()});$('restart').addEventListener('click',()=>location.reload());document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{mode=b.dataset.mode;data.settings.mode=mode;current=0;save();buildMap();updateMenu()}));$('quality').addEventListener('change',e=>{data.settings.quality=e.target.value;save();applySettings();updateMenu()});$('lookSpeed').addEventListener('input',e=>{data.settings.look=Number(e.target.value);save()});$('joySize').addEventListener('input',e=>{data.settings.joy=Number(e.target.value);save();applySettings()});$('horrorPower').addEventListener('change',e=>{data.settings.horror=Number(e.target.value);save();updateMenu()});$('zukan').addEventListener('click',openZukan);$('closeZukan').addEventListener('click',closeZukan);$('zukanModal').addEventListener('click',e=>{if(e.target.id==='zukanModal')closeZukan()});$('reset').addEventListener('click',()=>{if(!confirm('記録をリセットしますか？'))return;data.clears=0;data.best=0;data.seen={};data.seenCounts={};data.records={normal:null,hard:null,horror:null};save();updateMenu();renderZukan();showFlash('記録をリセットしました')})}

function renderZukan(){const grid=$('zukanGrid');grid.innerHTML='';for(const key of Object.keys(anomalyNames)){const found=!!data.seen[key];const div=document.createElement('div');div.className='zukanItem'+(found?'':' locked');const type=horror.includes(key)?'ホラー':mid.includes(key)?'中':'易';const count=data.seenCounts[key]||0;div.innerHTML='<b>'+(found?anomalyNames[key]:'？？？')+'</b><br><span class="tag">'+type+'</span> <span class="tag">発見 '+count+'回</span><br><small>'+(found?(anomalyHints[key]||'周囲を確認。'):'発見するとヒントが表示されます。')+'</small>';grid.appendChild(div)}}
